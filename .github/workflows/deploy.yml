name: Deploy

# Läuft nur bei Version-Tags (vX.Y.Z), erzeugt vom Release-Tool
# (scripts/release.sh bzw. `npm run release`). Ziel: Hetzner-VPS via
# Docker Compose — Images aus der GitHub Container Registry (GHCR).

on:
  push:
    tags:
      - 'v*'

jobs:
  # Test-Gate: kein Deploy ohne grüne Tests (Web + Backend) und Build.
  pruefen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - name: Web — Abhängigkeiten
        run: npm ci
      - name: Web — Tests + Typprüfung + Build
        run: |
          npm test
          npm run typecheck
          npm run build
      - name: Backend — Abhängigkeiten
        working-directory: server
        run: npm ci
      - name: Backend — Tests (mit Coverage-Gate) + Typprüfung
        working-directory: server
        run: |
          npm run test:coverage
          npm run typecheck

  deploy:
    needs: pruefen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: GHCR-Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Web-Image bauen + pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pikktee/journey-web:latest
            ghcr.io/pikktee/journey-web:${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - name: API-Image bauen + pushen
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/pikktee/journey-api:latest
            ghcr.io/pikktee/journey-api:${{ github.ref_name }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Auf dem VPS ausrollen
        # Benötigte Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY (Private Key,
        # Gegenstück in ~/.ssh/authorized_keys des VPS-Nutzers).
        # Auf dem VPS liegen /srv/luhambo/docker-compose.yml + .env.
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            'cd /srv/luhambo && docker compose pull && docker compose up -d && docker image prune -f'
