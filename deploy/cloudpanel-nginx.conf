# CloudPanel-Vhost für Luhambo — in den Vhost-Editor der Site einfügen
# (CloudPanel → Sites → <deine Site> → Vhost). CloudPanel liefert das
# umschließende server{}-Gerüst inkl. TLS; hier stehen die location-Blöcke, die
# den statischen Web-Build ausliefern und /api an die lokale API weiterreichen.
#
# WICHTIG: Der API-Container ist auf 127.0.0.1:8790 veröffentlicht (Host-Port in
# docker-compose.cloudpanel.yml; container-intern 8787) — nur dieser Nginx
# erreicht ihn, nichts von außen. Beide Ports müssen zusammenpassen.

# --- Uploads: GPX, Fotos, VIDEOS. Nginx-Default ist 1 MB → würde Uploads
# --- sofort mit 413 abwürgen. An das Server-Limit (500 MB Medien) + Luft anpassen.
client_max_body_size 600m;

# --- Statischer Web-Build (dist/ liegt im Document-Root der Site) ---
location / {
    # Unbekannte Pfade auf index.html (der Player nutzt ?tour=-Query, keine
    # echten Unterpfade — schadet aber nicht und deckt /studio.html mit ab).
    try_files $uri $uri/ /index.html;
}

# Gehashte Vite-Assets sind unveränderlich → aggressiv cachen.
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# index.html nie langfristig cachen, damit neue Deploys sofort greifen.
location = /index.html {
    add_header Cache-Control "no-cache";
}

# --- API + Medien an den lokalen Fastify-Container ---
# ^~ ist PFLICHT, wenn der (Static-Site-)Vhost eine Datei-Endungs-Regex enthält
# (…\.(mp4|jpg|png|ogg|…)$ — CloudPanels Standard-Template hat genau das): in
# Nginx schlagen Regex-Locations Prefix-Locations, sonst würde /api/.../*.mp4
# bzw. *.jpg von der Regex abgefangen und die API-Antwort verschluckt (404).
location ^~ /api/ {
    proxy_pass http://127.0.0.1:8790;
    proxy_http_version 1.1;

    # Echte Client-IP + Protokoll an die API (die vertraut dem Proxy: trustProxy).
    # Ohne X-Forwarded-For griffen die Rate-Limits (Login/Registrierung) global.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Große Uploads durchstreamen statt in Nginx zu puffern; Video-Transkodierung
    # kann dauern → großzügige Timeouts. Range-Requests (Video-Seeking) reicht
    # Nginx unverändert durch.
    proxy_request_buffering off;
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
}
