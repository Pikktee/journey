navigationCompose = "2.9.0"
room = "2.7.1"
workManager = "2.10.1"
camerax = "1.4.2"
playServicesLocation = "21.3.0"
kotlinxSerialization = "1.8.1"
kotlinxCoroutines = "1.10.2"
okhttp = "4.12.0"
datastore = "1.1.6"
exifinterface = "1.4.1"
junit = "4.13.2"
robolectric = "4.14.1"
androidxTestCore = "1.6.1"

[libraries]
