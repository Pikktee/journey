# Version-Katalog — eine Stelle für alle Abhängigkeiten des App-Moduls.

[versions]
agp = "8.10.1"
kotlin = "2.1.21"
ksp = "2.1.21-2.0.1"
coreKtx = "1.16.0"
lifecycle = "2.9.0"
activityCompose = "1.10.1"
